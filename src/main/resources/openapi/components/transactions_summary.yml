components:
  schemas:
    TransactionSummary:
      type: object
      required: [results, total]
      properties:
        results:
          type: number
          format: float
        total:
          type: number
          format: float
    TransactionSummaryResponse:
      type: object
      properties:
        content:
          $ref: '#/components/schemas/TransactionSummary'