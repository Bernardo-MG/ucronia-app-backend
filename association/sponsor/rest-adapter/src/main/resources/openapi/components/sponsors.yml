components:
  parameters:
    sponsorsSortParam:
      name: sort
      description: Sorting to apply.
      in: query
      style: form
      explode: true
      required: false
      schema:
        type: array
        items:
          type: string
          pattern: '^(firstName|lastName|number)\|(asc|desc)$'
          example: username|asc
  schemas:
    SponsorName:
      type: object
      required: [firstName, lastName, fullName]
      properties:
        firstName:
          type: string
          example: 'John'
          maxLength: 50
        lastName:
          type: string
          example: 'Smith'
          maxLength: 50
        fullName:
          type: string
          example: 'John Smith'
          maxLength: 100
    EditionSponsorName:
      type: object
      required: [firstName, lastName]
      properties:
        firstName:
          type: string
          example: 'John'
          maxLength: 50
        lastName:
          type: string
          example: 'Smith'
          maxLength: 50
    ContactMethod:
      type: object
      required: [number, name]
      properties:
        number:
          $ref: '../common/ids.yml#/components/schemas/Id'
        name:
          type: string
          description: Name of the contact method.
    ContactChannel:
      type: object
      required: [method, detail]
      properties:
        method:
          $ref: 'contact_methods.yml#/components/schemas/ContactMethod'
        detail:
          type: string
          description: Contact channel detail.
    EditionContactChannel:
      type: object
      required: [method, detail]
      properties:
        method:
          $ref: '../common/ids.yml#/components/schemas/Id'
        detail:
          type: string
          description: Contact detail.
          maxLength: 50
    Sponsor:
      type: object
      required: [number, name]
      properties:
        number:
          $ref: '../common/ids.yml#/components/schemas/Id'
        identifier:
          type: string
          description: Unique identifier of the sponsor.
        name:
          $ref: '#/components/schemas/SponsorName'
        birthDate:
          $ref: '../common/dates.yml#/components/schemas/Date'
        contactChannels:
          type: array
          items:
            $ref: '#/components/schemas/ContactChannel'
        years:
          type: array
          items:
            type: integer
        address:
          type: string
          description: Sponsor address.
        comments:
          type: string
          description: Comments about the sponsor.
        types:
          type: array
          items:
            type: string
    SponsorCreation:
      type: object
      required: [name]
      properties:
        identifier:
          type: string
          description: Unique identifier of the sponsor.
          maxLength: 15
        name:
          $ref: '#/components/schemas/EditionSponsorName'
    SponsorUpdate:
      type: object
      required: [name]
      properties:
        identifier:
          type: string
          maxLength: 15
        name:
          $ref: '#/components/schemas/EditionSponsorName'
        birthDate:
          $ref: '../common/dates.yml#/components/schemas/Date'
        contactChannels:
          type: array
          items:
            $ref: '#/components/schemas/EditionContactChannel'
        years:
          type: array
          items:
            type: integer
        address:
          type: string
          description: Sponsor address.
          maxLength: 250
        comments:
          type: string
          maxLength: 
    SponsorPatch:
      type: object
      properties:
        identifier:
          type: string
          maxLength: 15
        name:
          $ref: '#/components/schemas/EditionSponsorName'
        birthDate:
          $ref: '../common/dates.yml#/components/schemas/Date'
        contactChannels:
          type: array
          items:
            $ref: '#/components/schemas/EditionContactChannel'
        years:
          type: array
          items:
            type: integer
        address:
          type: string
          description: Sponsor address.
          maxLength: 250
        comments:
          type: string
          maxLength: 250
    SponsorPageResponse:
      allOf:
        - $ref: '../common/responses.yml#/components/schemas/PageResponse'
        - type: object
          properties:
            content:
              type: array
              items:
                $ref: '#/components/schemas/Sponsor'
    SponsorResponse:
      type: object
      properties:
        content:
          $ref: '#/components/schemas/Sponsor'