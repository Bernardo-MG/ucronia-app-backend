databaseChangeLog:
  - changeSet:
      id: transactions_schema
      author: Bernardo
      changes:
        - sqlFile:
            encoding: UTF-8
            path: sql/create_transactions_schema.sql
            relativeToChangelogFile: true
            splitStatements: true
            stripComments: true
  - changeSet:
      id: transactions
      author: Bernardo
      changes:
        - createTable:
            schemaName: funds
            tableName: transactions
            columns:
              - column:
                  name: id
                  type: bigint
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: index
                  type: bigint
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: description
                  type: varchar(200)
                  constraints:
                    nullable: false
                  defaultValue: ''
              - column:
                  name: amount
                  type: decimal(10,2)
                  constraints:
                    nullable: false
                  defaultValueNumeric: 0
              - column:
                  name: date
                  type: datetime
                  constraints:
                    nullable: false
                  defaultValueComputed: CURRENT_TIMESTAMP
        - addAutoIncrement:
            schemaName: funds
            tableName: transactions
            columnName: id
            columnDataType: bigint
            incrementBy: 1
            startWith: 1
      modifySql:
        - append:
            dbms: mysql
            value: ' ENGINE=InnoDB DEFAULT CHARSET=latin1'
  - changeSet:
      id: transactions_views
      author: Bernardo
      changes:
        -  createView:
            remarks: Monthly balance
            selectQuery: SELECT month_year AS date, results, SUM(results) OVER (ORDER BY month_year) AS total FROM (SELECT DATE_TRUNC('month', date) AS month_year, SUM(amount) AS results FROM funds.transactions GROUP BY month_year) AS subquery
            schemaName: funds
            viewName: monthly_balances
      modifySql:
        - append:
            dbms: mysql
            value: ' ENGINE=InnoDB DEFAULT CHARSET=latin1'
