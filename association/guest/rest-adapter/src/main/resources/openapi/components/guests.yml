components:
  parameters:
    guestsSortParam:
      name: sort
      description: Sorting to apply.
      in: query
      style: form
      explode: true
      required: false
      schema:
        type: array
        items:
          type: string
          pattern: '^(name.firstName|name.lastName|number)\|(asc|desc)$'
          example: username|asc
  schemas:
    GuestName:
      type: object
      required: [firstName, lastName, fullName]
      properties:
        firstName:
          type: string
          example: 'John'
          maxLength: 50
        lastName:
          type: string
          example: 'Smith'
          maxLength: 50
        fullName:
          type: string
          example: 'John Smith'
          maxLength: 100
    EditionGuestName:
      type: object
      required: [firstName, lastName]
      properties:
        firstName:
          type: string
          example: 'John'
          maxLength: 50
        lastName:
          type: string
          example: 'Smith'
          maxLength: 50
    ContactChannel:
      type: object
      required: [method, detail]
      properties:
        method:
          $ref: '#/components/schemas/ContactMethod'
        detail:
          type: string
          description: Contact channel detail.
    ContactMethod:
      type: object
      required: [number, name]
      properties:
        number:
          $ref: '../common/ids.yml#/components/schemas/Id'
        name:
          type: string
          description: Name of the contact method.
    EditionContactChannel:
      type: object
      required: [method, detail]
      properties:
        method:
          $ref: '../common/ids.yml#/components/schemas/Id'
        detail:
          type: string
          description: Contact detail.
          maxLength: 50
    Guest:
      type: object
      required: [number, name]
      properties:
        number:
          $ref: '../common/ids.yml#/components/schemas/Id'
        identifier:
          type: string
          description: Unique identifier of the guest.
          maxLength: 15
        name:
          $ref: '#/components/schemas/GuestName'
        birthDate:
          $ref: '../common/dates.yml#/components/schemas/Date'
        contactChannels:
          type: array
          items:
            $ref: '#/components/schemas/ContactChannel'
        games:
          type: array
          items:
            $ref: '../common/dates.yml#/components/schemas/Date'
        address:
          type: string
          description: Guest address.
          maxLength: 250
        comments:
          type: string
          description: Comments about the guest.
          maxLength: 250
        types:
          type: array
          items:
            type: string
    GuestCreation:
      type: object
      required: [name]
      properties:
        identifier:
          type: string
          description: Unique identifier of the contact.
        name:
          $ref: '#/components/schemas/EditionGuestName'
          maxLength: 250
    GuestUpdate:
      type: object
      required: [name]
      properties:
        identifier:
          type: string
        name:
          $ref: '#/components/schemas/EditionGuestName'
        birthDate:
          $ref: '../common/dates.yml#/components/schemas/Date'
        contactChannels:
          type: array
          items:
            $ref: '#/components/schemas/EditionContactChannel'
        games:
          type: array
          items:
            $ref: '../common/dates.yml#/components/schemas/Date'
        address:
          type: string
          description: Guest address.
          maxLength: 250
        comments:
          type: string
          maxLength: 250
    GuestPatch:
      type: object
      properties:
        identifier:
          type: string
        name:
          $ref: '#/components/schemas/EditionGuestName'
        birthDate:
          $ref: '../common/dates.yml#/components/schemas/Date'
        contactChannels:
          type: array
          items:
            $ref: '#/components/schemas/EditionContactChannel'
        games:
          type: array
          items:
            $ref: '../common/dates.yml#/components/schemas/Date'
        address:
          type: string
          description: Guest address.
          maxLength: 250
        comments:
          type: string
          maxLength: 250
    GuestPageResponse:
      allOf:
        - $ref: '../common/responses.yml#/components/schemas/PageResponse'
        - type: object
          properties:
            content:
              type: array
              items:
                $ref: '#/components/schemas/Guest'
    GuestResponse:
      type: object
      properties:
        content:
          $ref: '#/components/schemas/Guest'