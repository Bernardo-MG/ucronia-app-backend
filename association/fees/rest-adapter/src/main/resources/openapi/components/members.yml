components:
  schemas:
    Member:
      type: object
      required: [number, name]
      properties:
        number:
          $ref: '../common/ids.yml#/components/schemas/Id'
        name:
          $ref: '#/components/schemas/MemberName'
    MemberName:
      type: object
      required: [firstName, lastName, fullName]
      properties:
        firstName:
          type: string
          example: 'John'
          maxLength: 50
        lastName:
          type: string
          example: 'Smith'
          maxLength: 50
        fullName:
          type: string
          example: 'John Smith'
          maxLength: 100
    MemberStatus:
      type: string
      description: Status filter for member queries.
      enum: [ACTIVE, INACTIVE, ALL]