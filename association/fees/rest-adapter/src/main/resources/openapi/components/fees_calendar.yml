components:
  schemas:
    FeeCalendarMember:
      type: object
      required: [number, name, active]
      properties:
        number:
          $ref: '../common/ids.yml#/components/schemas/Id'
        name:
          $ref: 'members.yml#/components/schemas/MemberName'
        active:
          type: boolean
    YearsRange:
      type: object
      required: [years]
      properties:
        years:
          type: array
          items:
            type: integer
            example: 2023
    FeeCalendar:
      type: object
      required: [member, months]
      properties:
        member:
          $ref: '#/components/schemas/FeeCalendarMember'
        fees:
          type: array
          items:
            $ref: '#/components/schemas/MonthFee'
    MonthFee:
      type: object
      required: [month, paid]
      properties:
        month:
          $ref: '../common/dates.yml#/components/schemas/Date'
        paid:
          type: boolean
    YearsRangeResponse:
      type: object
      properties:
        content:
          $ref: '#/components/schemas/YearsRange'
    FeeCalendarResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/FeeCalendar'