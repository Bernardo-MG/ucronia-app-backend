components:
  parameters:
    feeCalendarsSortParam:
      name: sort
      description: Sorting to apply.
      in: query
      style: form
      explode: true
      required: false
      schema:
        type: array
        items:
          type: string
          pattern: '^(member.name.firstName|member.name.lastName)\|(asc|desc)$'
          example: member.name.firstName|asc
  schemas:
    FeeCalendarMember:
      type: object
      required: [number, name, active]
      properties:
        number:
          $ref: '../common/ids.yml#/components/schemas/Id'
        name:
          $ref: 'members.yml#/components/schemas/MemberName'
        active:
          type: boolean
    YearsRange:
      type: object
      required: [years]
      properties:
        years:
          type: array
          items:
            type: integer
            example: 2023
    FeeCalendar:
      type: object
      required: [member, fees]
      properties:
        member:
          $ref: '#/components/schemas/FeeCalendarMember'
        fees:
          type: array
          items:
            $ref: '#/components/schemas/MonthFee'
    MonthFee:
      type: object
      required: [month, paid]
      properties:
        month:
          $ref: '../common/dates.yml#/components/schemas/Date'
        paid:
          type: boolean
    YearsRangeResponse:
      type: object
      properties:
        content:
          $ref: '#/components/schemas/YearsRange'
    FeeCalendarResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/FeeCalendar'