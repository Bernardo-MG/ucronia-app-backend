components:
  schemas:
    MemberSummary:
      type: object
      required: [active, noRenew]
      properties:
        active:
          type: integer
          format: int64
          example: 120
          description: Number of active member
        renew:
          type: integer
          format: int64
          example: 120
          description: Number of active members which renew
    MemberSummaryResponse:
      type: object
      properties:
        content:
          $ref: '#/components/schemas/MemberSummary'