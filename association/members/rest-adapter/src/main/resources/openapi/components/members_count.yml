components:
  schemas:
    MemberCount:
      type: object
      required: [active, noRenew]
      properties:
        active:
          type: integer
          format: int64
          example: 120
          description: Number of active member
        renew:
          type: integer
          format: int64
          example: 120
          description: Number of active members which renew
    MemberCountResponse:
      type: object
      properties:
        content:
          $ref: '#/components/schemas/MemberCount'