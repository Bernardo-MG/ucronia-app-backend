components:
  parameters:
    activitiesSortParam:
      name: sort
      description: Sorting to apply.
      in: query
      style: form
      explode: true
      required: false
      schema:
        type: array
        items:
          type: string
          pattern: '^(description|title|date)\|(asc|desc)$'
          example: date|asc
  schemas:
    ActivityCreation:
      type: object
      required: [date, title, description]
      properties:
        date:
          $ref: '../common/dates.yml#/components/schemas/Date'
        title:
          type: string
        description:
          type: string
    ActivityUpdate:
      type: object
      required: [date, title, description]
      properties:
        date:
          $ref: '../common/dates.yml#/components/schemas/Date'
        title:
          type: string
        description:
          type: string
    Activity:
      type: object
      properties:
        number:
          $ref: '../common/ids.yml#/components/schemas/Id'
        date:
          $ref: '../common/dates.yml#/components/schemas/Date'
        title:
          type: string
        description:
          type: string
    ActivityPageResponse:
      allOf:
        - $ref: '../common/responses.yml#/components/schemas/PageResponse'
        - type: object
          properties:
            content:
              type: array
              items:
                $ref: '#/components/schemas/Activity'
    ActivityResponse:
      type: object
      properties:
        content:
          $ref: '#/components/schemas/Activity'