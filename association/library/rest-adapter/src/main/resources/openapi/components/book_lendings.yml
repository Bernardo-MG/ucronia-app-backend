components:
  parameters:
    bookLendingsSortParam:
      name: sort
      description: Sorting to apply.
      in: query
      style: form
      explode: true
      required: false
      schema:
        type: array
        items:
          type: string
          pattern: '^(book.title.title|borrower.fullname)\|(asc|desc)$'
          example: title|asc
  schemas:
    Borrower:
      type: object
      required: [number, name]
      properties:
        number:
          $ref: '../common/ids.yml#/components/schemas/Id'
        name:
          $ref: '#/components/schemas/BorrowerName'
    BorrowerName:
      type: object
      required: [firstName, lastName, fullName]
      properties:
        firstName:
          type: string
          example: 'John'
          maxLength: 50
        lastName:
          type: string
          example: 'Smith'
          maxLength: 50
        fullName:
          type: string
          example: 'John Smith'
          maxLength: 100
    BookLending:
      type: object
      properties:
        book:
          $ref: '#/components/schemas/BookLendingBook'
        borrower:
          $ref: '#/components/schemas/Borrower'
        lendingDate:
          $ref: '../common/dates.yml#/components/schemas/Date'
        returnDate:
          $ref: '../common/dates.yml#/components/schemas/Date'
          nullable: true
        days:
          type: integer
          format: int64
    BookLendingInfo:
      type: object
      properties:
        borrower:
          $ref: '#/components/schemas/Borrower'
        lendingDate:
          $ref: '../common/dates.yml#/components/schemas/Date'
        returnDate:
          $ref: '../common/dates.yml#/components/schemas/Date'
          nullable: true
        days:
          type: integer
          format: int64
    BookLendingBook:
      type: object
      required: [number, title]
      properties:
        number:
          $ref: '../common/ids.yml#/components/schemas/Id'
        title:
          $ref: 'books.yml#/components/schemas/BookTitle'
    BookLent:
      type: object
      required: [book, person, lendingDate]
      properties:
        book:
          $ref: '../common/ids.yml#/components/schemas/Id'
        borrower:
          $ref: '../common/ids.yml#/components/schemas/Id'
        lendingDate:
          $ref: '../common/dates.yml#/components/schemas/Date'
    BookReturned:
      type: object
      required: [book, borrower, returnDate]
      properties:
        book:
          $ref: '../common/ids.yml#/components/schemas/Id'
        borrower:
          $ref: '../common/ids.yml#/components/schemas/Id'
        returnDate:
          $ref: '../common/dates.yml#/components/schemas/Date'
    BookLendingPageResponse:
      allOf:
        - $ref: '../common/responses.yml#/components/schemas/PageResponse'
        - type: object
          properties:
            content:
              type: array
              items:
                $ref: '#/components/schemas/BookLending'
    BookLendingResponse:
      type: object
      properties:
        content:
          $ref: '#/components/schemas/BookLending'