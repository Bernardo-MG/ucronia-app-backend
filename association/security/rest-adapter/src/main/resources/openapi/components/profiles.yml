components:
  parameters:
    profilesSortParam:
      name: sort
      description: Sorting to apply.
      in: query
      style: form
      explode: true
      required: false
      schema:
        type: array
        items:
          type: string
          pattern: '^(firstName|lastName|number)\|(asc|desc)$'
          example: firstName|asc
  schemas:
    ProfileName:
      type: object
      required: [firstName, lastName, fullName]
      properties:
        firstName:
          type: string
          example: 'John'
          maxLength: 50
        lastName:
          type: string
          example: 'Smith'
          maxLength: 50
        fullName:
          type: string
          example: 'John Smith'
          maxLength: 100
    Profile:
      type: object
      required: [number, name]
      properties:
        number:
          $ref: '../common/ids.yml#/components/schemas/Id'
        identifier:
          type: string
          description: Unique identifier of the profile.
        name:
          $ref: 'profiles.yml#/components/schemas/ProfileName'
    ProfileResponse:
      type: object
      properties:
        content:
          $ref: '#/components/schemas/Profile'